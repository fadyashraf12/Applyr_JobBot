<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Transparent background for seamless blending with native app colors -->
  
  
  <g transform="translate(100, 45)">
    <!-- Speech bubble base in deep blue gradient -->
    <defs>
      <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e40af" />
        <stop offset="50%" stop-color="#2563eb" />
        <stop offset="100%" stop-color="#3b82f6" />
      </linearGradient>
      <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#60a5fa" />
        <stop offset="100%" stop-color="#2563eb" />
      </linearGradient>
    </defs>
    
    <!-- Bubble shadow -->
    <path d="M 100 190 L 70 215 L 75 185 C 30 180 0 145 0 100 C 0 45 45 0 100 0 C 155 0 200 45 200 100 C 200 145 165 180 120 185 Z" fill="#030712" opacity="0.3" transform="translate(2, 4)" />
    
    <!-- Bubble path -->
    <path d="M 100 190 L 70 215 L 75 185 C 30 180 0 145 0 100 C 0 45 45 0 100 0 C 155 0 200 45 200 100 C 200 145 165 180 120 185 Z" fill="url(#bubbleGrad)" />
    
    <!-- Outer white border of speech bubble -->
    <path d="M 100 190 L 70 215 L 75 185 C 30 180 0 145 0 100 C 0 45 45 0 100 0 C 155 0 200 45 200 100 C 200 145 165 180 120 185 Z" fill="none" stroke="#2563eb" stroke-width="4" opacity="0.4" />

    <!-- Cute winking Robot -->
    <!-- Head and ear cups -->
    <rect x="175" y="90" width="10" height="20" rx="4" fill="#cbd5e1" transform="rotate(-15, 180, 100)" />
    <rect x="15" y="90" width="10" height="20" rx="4" fill="#cbd5e1" transform="rotate(15, 20, 100)" />
    
    <!-- Robot main head (white/silver rounded rectangle) -->
    <rect x="35" y="45" width="130" height="95" rx="40" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3" />
    <!-- Inner face shield (dark grey) -->
    <rect x="47" y="57" width="106" height="71" rx="28" fill="#1e293b" />
    
    <!-- Glowing eyes -->
    <!-- Left eye: glowing winking/curved smiley eye -->
    <path d="M 65 92 Q 72 82 82 92" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" />
    <!-- Right eye: round wink or smiling arc depending on style. -->
    <path d="M 118 92 Q 125 82 135 92" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" />
    <!-- Glowing mouth -->
    <path d="M 90 108 Q 100 116 110 108" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" />

    <!-- Antenna -->
    <!-- Line -->
    <line x1="100" y1="45" x2="100" y2="25" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" />
    <!-- Glowing bulb -->
    <circle cx="100" cy="20" r="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="100" cy="20" r="6" fill="#22d3ee" />

    <!-- Shirt Collar & Blue Tie -->
    <path d="M 80 140 L 120 140 L 115 155 L 85 155 Z" fill="#ffffff" />
    <path d="M 92 140 L 100 144 L 108 140 L 100 156 Z" fill="#94a3b8" /> <!-- Collar Gap -->
    <path d="M 95 146 L 105 146 L 108 185 L 100 195 L 92 185 Z" fill="#2563eb" /> <!-- Blue Tie -->

    <!-- Document CV holding on right foreground -->
    <g transform="translate(115, 100)">
      <!-- Resume Sheet shadow -->
      <rect x="2" y="2" width="75" height="95" rx="12" fill="#000" opacity="0.25" />
      <!-- Resume Sheet -->
      <rect x="0" y="0" width="75" height="95" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
      
      <!-- Blue profile icon slot -->
      <circle cx="20" cy="22" r="8" fill="#3b82f6" />
      <path d="M 10 37 C 10 32 15 30 20 30 C 25 30 30 32 30 37 Z" fill="#3b82f6" />
      
      <!-- Text lines -->
      <line x1="38" y1="18" x2="65" y2="18" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
      <line x1="38" y1="26" x2="65" y2="26" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
      <line x1="15" y1="46" x2="60" y2="46" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
      <line x1="15" y1="54" x2="52" y2="54" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
      
      <!-- Blue checkmark badge in bottom-right corner -->
      <circle cx="53" cy="72" r="14" fill="#2563eb" stroke="#ffffff" stroke-width="2" />
      <!-- Checkmark path -->
      <path d="M 48 72 L 51 75 L 59 67" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Typography below: Applyr -->
  <!-- "Apply" in Bold White, "r" in light blue gradient -->
  <text x="50%" y="340" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="76" fill="#ffffff" letter-spacing="-2">
    Apply<tspan fill="url(#rGrad)">r</tspan>
  </text>
</svg>
